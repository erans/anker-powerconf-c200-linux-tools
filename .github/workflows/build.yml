name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run native tests
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            compiler: cc
          - arch: arm64
            compiler: aarch64-linux-gnu-gcc

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install ARM64 cross compiler
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: |
          make clean
          make CC="${{ matrix.compiler }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: anker-powerconf-c200-linux-tools-linux-${{ matrix.arch }}
          path: build/anker-powerconf-c200-linux-tools
          if-no-files-found: error
